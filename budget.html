<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WedFlow | מחשבון תקציב</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; }
        .bg-pearl { background-color: #FCFBF7; }
        .pink-gradient { background: linear-gradient(135deg, #FBCFE8 0%, #F9A8D4 100%); }
        @keyframes modalShow { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .animate-modal { animation: modalShow 0.3s ease-out; }
    </style>
</head>
    <div class="bg-pink-50/50 p-3 text-center text-sm font-medium text-pink-400">
    מזל טוב, <span id="displayNames" class="font-bold text-pink-500"></span>! הגיע הזמן לעשות סדר.
</div>

<script>
    // הקוד הזה מושך את השמות מהזיכרון ומציג אותם
    const name1 = localStorage.getItem('p1_name');
    const name2 = localStorage.getItem('p2_name');
    if(name1 && name2) {
        document.getElementById('displayNames').innerText = `${name1} & ${name2}`;
    }
</script>
<body class="bg-pearl min-h-screen text-slate-800">

    <nav class="bg-white/80 backdrop-blur-md border-b border-pink-100 p-4 sticky top-0 z-50">
        <div class="max-w-2xl mx-auto flex justify-between items-center">
            <span class="text-xl font-black text-pink-400 italic">WedFlow.</span>
        </div>
    </nav>

    <main class="max-w-xl mx-auto p-6">
        <header class="text-center mb-10 mt-6">
            <h1 class="text-4xl font-light mb-2">תכנון <span class="text-pink-400 font-semibold">תקציב</span></h1>
        </header>

        <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-pink-50 space-y-8">
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-3">כמה אורחים אתם מתכננים להזמין?</label>
                <input type="number" id="guestCount" placeholder="למשל: 300" class="w-full p-4 rounded-2xl bg-slate-50 border border-transparent focus:border-pink-200 focus:bg-white outline-none transition-all text-lg">
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-3">סכום עזרה מההורים (₪)</label>
                <input type="number" id="parentsHelp" placeholder="למשל: 50000" class="w-full p-4 rounded-2xl bg-slate-50 border border-transparent focus:border-pink-200 focus:bg-white outline-none transition-all text-lg">
            </div>
            <button onclick="calculateBudget()" class="w-full pink-gradient text-white p-5 rounded-2xl font-bold shadow-lg hover:scale-[1.02] transition-all text-xl">
                חשב תקציב חכם
            </button>
        </div>
    </main>

    <div id="budgetModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center hidden z-[100] p-4">
        <div class="bg-white w-full max-w-sm rounded-[3rem] p-10 shadow-2xl text-center animate-modal relative">
            <button onclick="closeModal()" class="absolute top-6 left-6 text-slate-300">✕</button>
            <div class="mb-8">
                <div class="w-20 h-20 bg-pink-50 rounded-full flex items-center justify-center mx-auto mb-6">💰</div>
                <h3 class="text-slate-400 text-xs font-bold tracking-widest uppercase mb-2">התקציב הכולל</h3>
                <h2 id="modalTotal" class="text-5xl font-black text-pink-500">₪0</h2>
            </div>
            <div class="space-y-4 border-t border-slate-50 pt-8">
                <div class="flex justify-between items-center bg-slate-50 p-4 rounded-2xl">
                    <span class="text-slate-500 text-sm">נשאר לספקים:</span>
                    <span id="modalVendor" class="font-bold text-slate-800 text-lg">₪0</span>
                </div>
                <button onclick="window.location.href='timeline.html'" class="w-full pink-gradient text-white p-5 rounded-2xl font-bold transition-all mt-4">מעולה, בואו נתחיל!</button>
            </div>
        </div>
    </div>

    <script>
        console.log("WedFlow Script Loaded Successfully!"); // בדיקה שהקוד נטען

        async function calculateBudget() {
            console.log("Button clicked!"); // בדיקה שהכפתור עובד
            
            const guests = document.getElementById('guestCount').value;
            const parents = document.getElementById('parentsHelp').value;

            if(!guests || !parents) {
                alert("נא למלא את כל השדות");
                return;
            }

            try {
                // קריאה ל-Java באקליפס
                const response = await fetch(`http://localhost:8080/api/budget-calc?guests=${guests}&parentsMoney=${parents}&giftAverage=350`);
                if (!response.ok) throw new Error('Backend not responding');
                
                const data = await response.json();

                document.getElementById('modalTotal').innerText = '₪' + data.totalBudget.toLocaleString();
                document.getElementById('modalVendor').innerText = '₪' + data.remainingForVendors.toLocaleString();
                document.getElementById('budgetModal').classList.remove('hidden');
                
            } catch (error) {
                console.error("Error:", error);
                alert("שגיאה: וודאי ששרת ה-Java באקליפס פועל!");
            }
        }

        function closeModal() {
            document.getElementById('budgetModal').classList.add('hidden');
        }
    </script>
</body>
</html>
