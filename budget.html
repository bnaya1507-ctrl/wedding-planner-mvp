<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WedFlow | מחשבון תקציב</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; }
        .bg-pearl { background-color: #FCFBF7; }
        .pink-gradient { background: linear-gradient(135deg, #FBCFE8 0%, #F9A8D4 100%); }
    </style>
</head>
<body class="bg-pearl min-h-screen text-slate-800">

    <nav class="bg-white/80 backdrop-blur-md border-b border-pink-100 p-4 sticky top-0 z-50">
        <div class="max-w-2xl mx-auto flex justify-between items-center">
            <span class="text-xl font-black text-pink-400 italic">WedFlow.</span>
        </div>
    </nav>

    <main class="max-w-xl mx-auto p-6">
        <header class="text-center mb-10 mt-6">
            <h1 class="text-4xl font-light mb-2">תכנון <span class="text-pink-400 font-semibold">תקציב</span></h1>
            <p class="text-slate-500">בואו נבין כמה כסף באמת עומד לרשותכם</p>
        </header>

        <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-pink-50 space-y-6">
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">כמה אורחים אתם מתכננים להזמין?</label>
                <input type="number" id="guestCount" placeholder="למשל: 300" 
                       class="w-full p-4 rounded-2xl border border-pink-100 focus:ring-2 focus:ring-pink-300 outline-none transition">
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">סכום עזרה מההורים (₪)</label>
                <input type="number" id="parentsHelp" placeholder="למשל: 50000" 
                       class="w-full p-4 rounded-2xl border border-pink-100 focus:ring-2 focus:ring-pink-300 outline-none transition">
            </div>

            <button onclick="calculateBudget()" 
                    class="w-full pink-gradient text-white p-5 rounded-2xl font-bold shadow-lg hover:scale-[1.02] active:scale-[0.98] transition-all">
                חשב תקציב חכם
            </button>
        </div>

        <div id="results" class="mt-8 space-y-4 hidden">
            <div class="bg-pink-50 p-6 rounded-[2rem] border border-pink-100 text-center">
                <p class="text-slate-500 text-sm">תקציב כולל מוערך (כולל צ'קים):</p>
                <h2 id="totalBudget" class="text-4xl font-black text-pink-500 mt-1">₪0</h2>
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white p-4 rounded-2xl border border-pink-50">
                    <p class="text-slate-400 text-xs">נשאר לספקים:</p>
                    <p id="vendorBudget" class="text-xl font-bold text-slate-700">₪0</p>
                </div>
                <div class="bg-white p-4 rounded-2xl border border-pink-50 text-center">
                    <button onclick="window.location.href='timeline.html'" class="text-pink-400 font-bold text-sm underline mt-2">המשך ל-Timeline</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        async function calculateBudget() {
            const guests = document.getElementById('guestCount').value;
            const parents = document.getElementById('parentsHelp').value;

            if(!guests || !parents) {
                alert("אנא מלאו את כל השדות");
                return;
            }

            try {
                // פנייה ל-Java Backend שיצרת באקליפס
                const response = await fetch(`http://localhost:8080/api/budget-calc?guests=${guests}&parentsMoney=${parents}&giftAverage=350`);
                const data = await response.json();

                // עדכון התצוגה עם הנתונים שחזרו מה-Java
                document.getElementById('totalBudget').innerText = '₪' + data.totalBudget.toLocaleString();
                document.getElementById('vendorBudget').innerText = '₪' + data.remainingForVendors.toLocaleString();
                document.getElementById('results').classList.remove('hidden');
                
                // שמירת התקציב לשימוש בדפים אחרים
                localStorage.setItem('total_budget', data.totalBudget);
            } catch (error) {
                alert("וודאי ששרת ה-Java באקליפס פועל!");
            }
        }
    </script>
</body>
</html>
