<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WedFlow | מחשבון תקציב חכם</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; }
        .bg-pearl { background-color: #FCFBF7; }
        .pink-gradient { background: linear-gradient(135deg, #FBCFE8 0%, #F9A8D4 100%); }
        
        /* אנימציה עדינה לכניסת המודאל */
        @keyframes modalShow {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .animate-modal { animation: modalShow 0.3s ease-out; }
    </style>
</head>
<body class="bg-pearl min-h-screen text-slate-800">

    <nav class="bg-white/80 backdrop-blur-md border-b border-pink-100 p-4 sticky top-0 z-50">
        <div class="max-w-2xl mx-auto flex justify-between items-center">
            <span class="text-xl font-black text-pink-400 italic">WedFlow.</span>
            <a href="index.html" class="text-sm text-slate-400 hover:text-pink-400 transition">חזרה לבית</a>
        </div>
    </nav>

    <main class="max-w-xl mx-auto p-6">
        <header class="text-center mb-10 mt-6">
            <h1 class="text-4xl font-light mb-2">תכנון <span class="text-pink-400 font-semibold">תקציב</span></h1>
            <p class="text-slate-500">בואו נבין כמה כסף באמת עומד לרשותכם</p>
        </header>

        <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-pink-50 space-y-8">
            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-3">כמה אורחים אתם מתכננים להזמין?</label>
                    <input type="number" id="guestCount" placeholder="למשל: 300" 
                           class="w-full p-4 rounded-2xl bg-slate-50 border border-transparent focus:border-pink-200 focus:bg-white focus:ring-4 focus:ring-pink-50 outline-none transition-all text-lg">
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-3">סכום עזרה מההורים (₪)</label>
                    <input type="number" id="parentsHelp" placeholder="למשל: 50000" 
                           class="w-full p-4 rounded-2xl bg-slate-50 border border-transparent focus:border-pink-200 focus:bg-white focus:ring-4 focus:ring-pink-50 outline-none transition-all text-lg">
                </div>
            </div>

            <button onclick="calculateBudget()" 
                    class="w-full pink-gradient text-white p-5 rounded-2xl font-bold shadow-lg shadow-pink-100 hover:scale-[1.02] active:scale-[0.98] transition-all text-xl">
                חשב תקציב חכם
            </button>
        </div>
    </main>

    <div id="budgetModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center hidden z-[100] p-4">
        <div class="bg-white w-full max-w-sm rounded-[3rem] p-10 shadow-2xl border border-pink-50 text-center relative animate-modal">
