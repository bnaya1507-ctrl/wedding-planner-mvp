<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>WedFlow | Explore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #fafafa; }
        .venue-card img { transition: transform 0.5s ease; }
        .venue-card:hover img { transform: scale(1.1); }
    </style>
</head>
<body>

    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50 p-4">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <span class="text-2xl font-black text-pink-400 italic">WedFlow</span>
            <div class="flex space-y-0 space-x-4">
                <span class="text-gray-400">🔍 חיפוש לפי התאמה</span>
            </div>
        </div>
    </nav>

    <main class="max-w-md mx-auto p-4 pb-20">
        <div class="mb-6 px-2">
            <h2 class="text-xl font-bold">מקומות שמתאימים לכם...</h2>
            <p class="text-gray-400 text-sm">סיננו עבורכם את התוצאות הכי רלוונטיות</p>
        </div>

        <div id="venueGrid" class="grid grid-cols-2 gap-2">
            </div>
    </main>

    <script>
        async function loadVenues() {
            // משיכת ההעדפות ששמרנו בשאלון
            const location = localStorage.getItem('venue_location');
            const type = localStorage.getItem('venue_style');

            try {
                const response = await fetch(`http://localhost:8080/api/venues/search?location=${location}&type=${type}`);
                const venues = await response.json();

                const grid = document.getElementById('venueGrid');
                if(venues.length === 0) {
                    grid.innerHTML = "<p class='col-span-2 text-center py-10 text-gray-400'>לא מצאנו אולם שמתאים בדיוק, נסו לשנות אזור...</p>";
                    return;
                }

                venues.forEach(v => {
                    const card = `
                        <div class="venue-card relative aspect-square overflow-hidden rounded-lg shadow-sm group">
                            <img src="${v.imageUrl}" class="w-full h-full object-cover">
                            <div class="absolute inset-0 bg-black/20 group-hover:bg-black/40 transition-all flex flex-col justify-end p-3">
                                <h3 class="text-white font-bold text-sm leading-tight">${v.name}</h3>
                                <p class="text-white/80 text-[10px]">₪${v.pricePerPlate} למנה</p>
                            </div>
                        </div>
                    `;
                    grid.innerHTML += card;
                });
            } catch (error) {
                alert("וודאי שה-Java רץ באקליפס!");
            }
        }

        window.onload = loadVenues;
    </script>
</body>
</html>
