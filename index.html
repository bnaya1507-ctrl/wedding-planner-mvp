<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WedFlow | תכנון חתונה חכם</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; }
        .bg-soft { background-color: #fcfdfd; }
        .accent-gradient {
            background: linear-gradient(135deg, #059669 0%, #10b981 100%);
        }
    </style>
</head>
<body class="bg-soft text-slate-800 antialiased">

    <nav class="sticky top-0 bg-white/80 backdrop-blur-md z-50 border-b border-slate-100">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="text-2xl font-black tracking-tighter text-emerald-600 italic">WedFlow.</div>
            <div class="hidden md:flex space-x-reverse space-x-8 text-sm font-medium">
                <a href="#" class="text-slate-500 hover:text-emerald-600 transition">המסלול שלנו</a>
                <a href="#" class="text-slate-500 hover:text-emerald-600 transition">כלים חכמים</a>
                <button class="bg-slate-100 px-4 py-2 rounded-full text-slate-700 hover:bg-slate-200 transition">כניסה</button>
            </div>
        </div>
    </nav>

    <section class="relative pt-20 pb-16 lg:pt-32">
        <div class="max-w-4xl mx-auto text-center px-6">
            <span class="inline-block py-1 px-3 rounded-full bg-emerald-50 text-emerald-700 text-xs font-bold tracking-widest uppercase mb-4">
                הדרך החדשה להתחתן
            </span>
            <h1 class="text-5xl lg:text-7xl font-light mb-6 leading-tight">
                להפוך את התכנון <br>
                <span class="font-semibold italic text-slate-900 underline decoration-emerald-400 decoration-4 underline-offset-8">לחוויה זורמת</span>
            </h1>
            <p class="text-lg text-slate-500 mb-12 max-w-xl mx-auto">
                בנינו עבורכם את הטייס האוטומטי לחתונה שלכם. ציר זמן חכם, ניהול תקציב מדויק ואפס הצפה של מידע מיותר.
            </p>

            <div class="max-w-md mx-auto bg-white p-2 rounded-2xl shadow-2xl shadow-emerald-100 border border-slate-50">
                <div class="flex flex-col md:flex-row gap-2">
                    <input type="date" id="wedding-date" 
                        class="flex-1 px-5 py-4 rounded-xl bg-slate-50 border-transparent focus:bg-white focus:ring-2 focus:ring-emerald-500 outline-none transition">
                    <button onclick="saveAndGo()" 
                        class="accent-gradient text-white px-8 py-4 rounded-xl font-bold shadow-lg shadow-emerald-200 hover:scale-[1.02] active:scale-95 transition-all">
                        בואו נזרום
                    </button>
                </div>
                <p class="text-[10px] text-slate-400 mt-3 italic">אין צורך ברישום • פרטיות מלאה • אפס ספאם</p>
            </div>
        </div>
    </section>

    <div class="text-center pb-20">
        <p class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-8 uppercase">הכלים שתמצאו אצלנו</p>
        <div class="flex flex-wrap justify-center gap-8 md:gap-16 opacity-60">
            <span class="font-bold">תקציב חכם</span>
            <span class="font-bold">Timeline אישי</span>
            <span class="font-bold">סינון ספקים</span>
            <span class="font-bold">צ'ק-ליסט רבנות</span>
        </div>
    </div>

    <script>
        function saveAndGo() {
            const date = document.getElementById('wedding-date').value;
            if (!date) {
                alert('רגע! רק תגידו לנו מתי החתונה כדי שנתחיל');
                return;
            }
            localStorage.setItem('wedFlow_date', date);
            
            // כאן בהמשך נעבור לעמוד ה-Timeline
            alert('מעולה! התאריך נשמר. השם החדש WedFlow כבר אצלנו במערכת. הצעד הבא: בניית ה-Timeline.');
        }
    </script>
</body>
</html>
