<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>WedFlow | תכנון חתונה חכם</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Assistant', sans-serif; 
            scroll-behavior: smooth;
        }
        .bg-soft-gradient {
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
        }
    </style>
</head>
<body class="bg-soft-gradient min-h-screen text-slate-900 antialiased">

    <nav class="bg-white/90 backdrop-blur-sm border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="text-2xl font-black text-emerald-600 tracking-tighter">WedFlow.</div>
                <div class="hidden md:flex space-x-reverse space-x-6">
                    <a href="#how-it-works" class="text-slate-600 hover:text-emerald-600 transition">איך זה עובד?</a>
                    <a href="#features" class="text-slate-600 hover:text-emerald-600 transition">כלים</a>
                </div>
            </div>
        </div>
    </nav>

    <header class="py-16 md:py-24 px-4 text-center">
        <div class="max-w-3xl mx-auto">
            <h1 class="text-4xl md:text-6xl font-extrabold text-slate-900 mb-6 leading-tight">
                תכנון חתונה <br>
                <span class="text-emerald-600 italic font-light">בלי הלחץ מסביב.</span>
            </h1>
            <p class="text-lg md:text-xl text-slate-600 mb-10 leading-relaxed">
                הגיע הזמן להפסיק לטבוע בטבלאות אקסל. WedFlow בונה לכם ציר זמן אישי, מנהל את התקציב ושומר לכם על השפיות.
            </p>

            <div class="bg-white p-6 md:p-8 rounded-3xl shadow-2xl border border-slate-100 max-w-md mx-auto">
                <label for="wedding-date" class="block text-sm font-semibold text-slate-700 mb-4">מתי היום הגדול שלכם?</label>
                <div class="flex flex-col gap-3">
                    <input type="date" id="wedding-date" 
                        class="w-full px-4 py-4 rounded-xl bg-slate-50 border border-slate-200 focus:ring-2 focus:ring-emerald-500 focus:bg-white outline-none transition">
                    <button onclick="handleStart()" 
                        class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-emerald-200 transition transform active:scale-9
