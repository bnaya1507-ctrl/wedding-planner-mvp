<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>WedFlow | מתחילים כאן</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #FCFBF7; }
        .pink-gradient { background: linear-gradient(135deg, #FBCFE8 0%, #F9A8D4 100%); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <main class="max-w-md w-full bg-white p-10 rounded-[3rem] shadow-xl border border-pink-50 text-center">
        <div class="mb-8">
            <span class="text-3xl font-black text-pink-400 italic">WedFlow.</span>
            <h1 class="text-2xl font-light text-slate-700 mt-4">נעים להכיר! איך קוראים לכם?</h1>
        </div>

        <div class="space-y-6">
            <div class="grid grid-cols-2 gap-4">
                <input type="text" id="partner1" placeholder="שם הכלה" 
                       class="w-full p-4 rounded-2xl bg-slate-50 border border-transparent focus:border-pink-200 outline-none transition-all text-center font-bold">
                <input type="text" id="partner2" placeholder="שם החתן" 
                       class="w-full p-4 rounded-2xl bg-slate-50 border border-transparent focus:border-pink-200 outline-none transition-all text-center font-bold">
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-400 mb-2 uppercase tracking-widest">תאריך החתונה (אם יש)</label>
                <input type="date" id="weddingDate" 
                       class="w-full p-4 rounded-2xl bg-slate-50 border border-transparent focus:border-pink-200 outline-none transition-all text-center">
            </div>

            <button onclick="startJourney()" 
                    class="w-full pink-gradient text-white p-5 rounded-2xl font-bold shadow-lg hover:scale-[1.02] transition-all text-xl mt-4">
                בואו נתחיל לתכנן!
            </button>
        </div>
    </main>

    <script>
        function startJourney() {
            const p1 = document.getElementById('partner1').value;
            const p2 = document.getElementById('partner2').value;
            const date = document.getElementById('weddingDate').value;

            if(!p1 || !p2) {
                alert("אנא הכניסו את שמות בני הזוג");
                return;
            }

            // שמירה בזיכרון המקומי (Local Storage)
            localStorage.setItem('p1_name', p1);
            localStorage.setItem('p2_name', p2);
            localStorage.setItem('wedding_date', date);

            // מעבר לשלב הבא - רשימת מוזמנים
            window.location.href = 'guests.html';
        }
    </script>
</body>
</html>
