<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>WedFlow | בחירת המקום המושלם</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #FCFBF7; }
        .selection-card:hover { border-color: #F9A8D4; transform: translateY(-5px); }
        .pink-gradient { background: linear-gradient(135deg, #FBCFE8 0%, #F9A8D4 100%); }
    </style>
</head>
<body class="p-6">

    <main class="max-w-3xl mx-auto">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-light">איפה זה <span class="text-pink-400 font-bold">יקרה?</span></h1>
            <p class="text-slate-500 mt-2">בואו נגדיר את האווירה של החתונה שלכם</p>
        </header>

        <div class="space-y-10">
            <section>
                <h3 class="text-xl font-bold text-slate-700 mb-4">1. מה הסגנון המועדף עליכם?</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div onclick="selectStyle('garden')" id="style-garden" class="selection-card bg-white p-6 rounded-3xl border-2 border-transparent shadow-sm cursor-pointer transition-all">
                        <span class="text-3xl">🌿</span>
                        <h4 class="font-bold mt-2">גן אירועים</h4>
                        <p class="text-xs text-slate-400">פתוח, טבעי, תחת השמיים</p>
                    </div>
                    <div onclick="selectStyle('hall')" id="style-hall" class="selection-card bg-white p-6 rounded-3xl border-2 border-transparent shadow-sm cursor-pointer transition-all">
                        <span class="text-3xl">🏛️</span>
                        <h4 class="font-bold mt-2">אולם אירועים</h4>
                        <p class="text-xs text-slate-400">מודרני, ממוזג, יוקרתי</p>
                    </div>
                </div>
            </section>

            <section>
                <h3 class="text-xl font-bold text-slate-700 mb-4">2. באיזה אזור תרצו להתחתן?</h3>
                <select id="locationSelect" class="w-full p-4 rounded-2xl bg-white border-2 border-pink-50 outline-none focus:border-pink-200 transition-all font-medium text-slate-600">
                    <option value="" disabled selected>בחרו אזור...</option>
                    <option value="center">מרכז (ת"א, השפלה)</option>
                    <option value="sharon">שרון (נתניה, עמק חפר)</option>
                    <option value="north">צפון (חיפה, גליל)</option>
                    <option value="south">דרום (אשדוד, באר שבע)</option>
                    <option value="jerusalem">ירושלים והסביבה</option>
                </select>
            </section>

            <button onclick="saveVenuePreferences()" class="w-full pink-gradient text-white p-5 rounded-2xl font-bold shadow-lg text-xl hover:scale-[1.02] transition-all">
                המשך לשאלות שחובה לשאול באולם
            </button>
        </div>
    </main>

    <script>
        let selectedStyle = '';

        function selectStyle(style) {
            selectedStyle = style;
            document.getElementById('style-garden').style.borderColor = (style === 'garden') ? '#F9A8D4' : 'transparent';
            document.getElementById('style-hall').style.borderColor = (style === 'hall') ? '#F9A8D4' : 'transparent';
        }

        function saveVenuePreferences() {
            const location = document.getElementById('locationSelect').value;
            if(!selectedStyle || !location) {
                alert("אנא בחרו סגנון ומיקום");
                return;
            }
            
            localStorage.setItem('venue_style', selectedStyle);
            localStorage.setItem('venue_location', location);
            
            // כאן נוכל להוסיף מעבר לעמוד ה-Checklist או חזרה לתקציב
            alert("ההעדפות נשמרו! עכשיו נוכל להתאים לכם מקומות ב" + location);
        }
    </script>
</body>
</html>
