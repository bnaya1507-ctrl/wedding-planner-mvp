<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WedFlow | ה-Timeline האישי שלכם</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; }
        .bg-pearl { background-color: #FCFBF7; }
        .task-done { text-decoration: line-through; opacity: 0.5; }
        .pink-gradient { background: linear-gradient(135deg, #FBCFE8 0%, #F9A8D4 100%); }
    </style>
</head>
<body class="bg-pearl min-h-screen text-slate-800">

    <nav class="bg-white/80 backdrop-blur-md border-b border-pink-100 p-4 sticky top-0 z-50">
        <div class="max-w-2xl mx-auto flex justify-between items-center">
            <a href="index.html" class="text-xl font-black text-pink-400 italic">WedFlow.</a>
            <div id="days-count" class="text-xs font-bold bg-pink-50 text-pink-500 px-3 py-1 rounded-full border border-pink-100"></div>
        </div>
    </nav>

    <div id="server-status" class="max-w-2xl mx-auto mt-4 px-6 py-2 rounded-xl text-center text-xs hidden">
        </div>

    <main class="max-w-2xl mx-auto p-6">
        <header class="mb-10 mt-6">
            <h1 class="text-4xl font-light mb-2">המסלול שלכם <span class="text-pink-400 font-semibold">לחתונה</span></h1>
            <p class="text-slate-500">בואו נראה איפה אנחנו עומדים היום</p>
        </header>

        <div class="mb-10">
            <div class="flex justify-between text-xs font-bold text-pink-400 mb-2 uppercase tracking-widest">
                <span>התקדמות כללית</span>
                <span id="progress-text">0%</span>
            </div>
            <div class="bg-pink-100 h-3 w-full rounded-full">
                <div id="progress-bar" class="pink-gradient h-3 rounded-full transition-all duration-700 shadow-sm" style="width: 0%"></div>
            </div>
        </div>

        <div id="task-list" class="space-y-4">
            </div>
    </main>

    <script>
        // 1. הגדרות ונתונים ראשוניים
        const weddingDateStr = localStorage.getItem('wedflow_wedding_date');
        
        if (!weddingDateStr) {
            window.location.href = 'index.html';
        }

        const tasks = [
            { id: 1, text: "סגירת מקום (אולם/גן)", done: false },
            { id: 2, text: "הכנת רשימת מוזמנים ראשונית", done: false },
            { id: 3, text: "בחירת צלם ו-DJ", done: false },
            { id: 4, text: "קביעת תקציב מקסימלי", done: false },
            { id: 5, text: "בחירת שמלת כלה", done: false }
        ];

        // 2. חיבור לשרת ה-Java (Backend)
        async function checkBackend() {
            const statusDiv = document.getElementById('server-status');
            try {
                // קריאה ל-Java שרצת ב-Eclipse
                const response = await fetch('http://localhost:8080/api/status');
                const data = await response.json();
                
                statusDiv.innerText = "✓ " + data.message;
                statusDiv.classList.remove('hidden', 'bg-red-50', 'text-red-400');
                statusDiv.classList.add('bg-emerald-50', 'text-emerald-600');
            } catch (err) {
                statusDiv.innerText = "⚠ השרת המקומי (Java) לא מחובר - עובד במצב Offline";
                statusDiv.classList.remove('hidden', 'bg-emerald-50', 'text-emerald-600');
                statusDiv.classList.add('bg-pink-50', 'text-pink-400');
            }
        }

        // 3. חישוב ימים לחתונה
        function updateCountdown() {
            const weddingDate = new Date(weddingDateStr);
            const today = new Date();
            const diffTime = weddingDate - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            document.getElementById('days-count').innerText = diffDays > 0 
                ? `עוד ${diffDays} ימים ליום הגדול!` 
                : "מזל טוב! היום זה היום!";
        }

        // 4. ניהול משימות ופס התקדמות
        function renderTasks() {
            const container = document.getElementById('task-list');
            container.innerHTML = '';
            let doneCount = 0;

            tasks.forEach(task => {
                if(task.done) doneCount++;
                
                const card = document.createElement('div');
                card.className = `group flex items-center p-6 bg-white rounded-[1.5rem] shadow-sm border border-pink-50 hover:shadow-md transition cursor-pointer ${task.done ? 'bg-slate-50/50' : ''}`;
                card.onclick = () => toggleTask(task.id);
                
                card.innerHTML = `
                    <div class="w-7 h-7 rounded-full border-2 flex items-center justify-center transition ${task.done ? 'bg-pink-400 border-pink-400' : 'border-pink-200'}">
                        ${task.done ? '<svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>' : ''}
                    </div>
                    <span class="mr-4 text-lg font-medium transition ${task.done ? 'task-done text-slate-400' : 'text-slate-700'}">${task.text}</span>
                `;
                container.appendChild(card);
            });

            const percent = Math.round((doneCount / tasks.length) * 100);
            document.getElementById('progress-bar').style.width = percent + '%';
            document.getElementById('progress-text').innerText = percent + '%';
        }

        function toggleTask(id) {
            const task = tasks.find(t => t.id === id);
            task.done = !task.done;
            renderTasks();
        }

        // הפעלה
        checkBackend();
        updateCountdown();
        renderTasks();
    </script>
</body>
</html>
